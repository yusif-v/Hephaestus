# Hephaestus v0.1 — HDFS Balanced Profile
model:
  name: "Qwen/Qwen2.5-1.5B-Instruct"
  dtype: "float16"

dataset:
  data/hdfs/hdfs_train_conversations.jsonl
  data/hdfs/hdfs_test_conversations.jsonl

lora:
  rank: 128
  alpha: 256
  dropout: 0.05
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]

training:
  max_steps: 150
  learning_rate: 0.00003
  warmup_steps: 15
  batch_size: 2
  gradient_accumulation_steps: 2
  optimizer: "adamw_bnb_8bit"
  gradient_checkpointing: true
  bf16: true
  max_length: 1024

evaluation:
  quality_gate: 0.95
  max_test_samples: 500

export:
  quantize: "int4"
  benchmark: true

output:
  dir: "outputs/hdfs-1.5b"

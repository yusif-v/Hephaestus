# Hephaestus v0.2 — Phishing Detection Automaton
task_name: phishing-detection
system_prompt: "You are a phishing email detection expert. Classify each email as PHISHING or LEGITIMATE. Respond with ONLY the classification label and a brief reason."

model:
  name: "Qwen/Qwen2.5-3B-Instruct"
  dtype: "float16"

dataset:
  train_path: "data/phishing/train.jsonl"
  test_path: "data/phishing/test.jsonl"
  max_samples: 50000
  max_val_samples: 1000

lora:
  rank: 256
  alpha: 512
  dropout: 0.05
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]

training:
  max_steps: 200
  learning_rate: 0.00002
  warmup_steps: 20
  batch_size: 1
  gradient_accumulation_steps: 2
  optimizer: "adamw_bnb_8bit"
  gradient_checkpointing: true
  bf16: true
  max_length: 2048
  logging_steps: 10

evaluation:
  quality_gate: 0.95
  metrics: ["accuracy", "precision", "recall", "f1"]
  max_test_samples: 1000
  task_type: "binary"
  classes: ["PHISHING", "LEGITIMATE"]

export:
  quantize: null
  format: "safetensors"
  benchmark: true

output:
  dir: "outputs/phishing-3b"
  save_model_card: true
